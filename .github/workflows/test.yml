name: Python Tests

on:
  push:
    branches: [ feat/ci-cd ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: pytest
